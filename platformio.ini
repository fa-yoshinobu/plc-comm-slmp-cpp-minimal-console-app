[platformio]
src_dir = .

[env:m5stack-atom-console]
platform = espressif32
board = m5stack-atom
framework = arduino
monitor_speed = 115200
monitor_eol = LF
monitor_filters = send_on_enter
lib_deps =
    https://github.com/fa-yoshinobu/plc-comm-slmp-cpp-minimal.git
build_src_filter =
    +<platformio/atom_matrix_serial_console_smoke.cpp>

[env:wiznet_6300_evb_pico2]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = wiznet_6300_evb_pico2
framework = arduino
board_build.core = earlephilhower
monitor_speed = 115200
lib_deps =
    https://github.com/fa-yoshinobu/plc-comm-slmp-cpp-minimal.git
lib_ignore =
    ESPHost
    lwIP_ESPHost
    lwIP_CYW43
    lwIP_WINC1500
build_src_filter =
    +<platformio/w6300_evb_pico2_smoke.cpp>
